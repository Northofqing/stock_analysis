name: Coverage Gate

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust with coverage tools
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Collect complete workspace coverage
        run: |
          mkdir -p target/coverage
          cargo llvm-cov --workspace --all-features --json \
            --output-path target/coverage/coverage.json -- --test-threads=1

      - name: Enforce AGENTS coverage (global 80%, core 95%)
        run: python3 tools/coverage/check_thresholds.py target/coverage/coverage.json

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/coverage/coverage.json
