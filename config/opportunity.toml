# =====================================================================
# v9 机会发现流水线 调度 + 阈值 配置
# SIGHUP 热加载, 缺 toml 时 const fallback
# 修复 v9.1 §1.3 调度空白 (盘前 9:00 + 盘中每 5min)
# =====================================================================

# 修复 v9.1 §1.3 调度空白
[schedule]
# 盘前 batch 触发时刻 (24h "HH:MM")
# 默认 09:00 (A 股开盘前)
batch_morning_time = "09:00"
# 盘后 batch 触发时刻 (复盘)
# 默认 15:30 (A 股收盘后 30min, 数据稳定)
batch_evening_time = "15:30"
# 盘中 incremental 间隔 (分钟)
# 默认 5min, 与 5min K 线扫描同步
incremental_interval_min = 5

# 修复 v9.1 §1.3 event_extractor 阈值
# AI 不可用时: 走规则预筛 + degraded event_risk_score 30
# 盘前 batch: 1 个交易日内 (spec §5.1)
batch_max_age_hours = 24
# 盘中 incremental: 5min (快讯新鲜度)
incremental_max_age_min = 5

# 修复 v9.1 §0 NS3 + §4 B10 推送分层
# 70-79: 入候选池 (复盘查阅, 不主动推)
# 80+: 实时推送
# 注: 与 src/opportunity/score.rs:147 min(70.0) 对齐 — 沙盘无 winrate 时
# event_risk_score 上限是 70, push_threshold 必须 ≤ 70, 否则矛盾。
# v9.2 改: 60 (与 in_pool 兜底一致, NS3 解除后升到 75)
# Refs: spec §0 NS3
[push]
event_risk_score_threshold = 60
# 跨源要求 (true = 必须快讯 + Web 双源共振, 降低单源假信号)
# 沙盘/灰度阶段推荐 false, 实盘阶段 true
require_cross_source = false
# 至少 fast_hits + web_hits 总和 (NS3 §4 防 0 信号)
min_total_hits = 1
